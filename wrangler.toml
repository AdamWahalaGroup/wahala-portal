name = "wahala-portal"
main = ".open-next/worker.js"
compatibility_date = "2025-03-25"
compatibility_flags = ["nodejs_compat"]

# Static assets produced by the OpenNext build
[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# Cloudflare D1 (SQLite) — run `npx wrangler d1 create wahala-portal`
# then paste the returned database_id below.
[[d1_databases]]
binding = "DB"
database_name = "wahala-portal"
database_id = "TODO_RUN_wrangler_d1_create"
migrations_dir = "drizzle/migrations"

# Cloudflare R2 (files + meeting recordings) — run
# `npx wrangler r2 bucket create wahala-portal-assets`
[[r2_buckets]]
binding = "R2"
bucket_name = "wahala-portal-assets"

# Secrets (COGNITO_*, STRIPE_SECRET_KEY, etc.) are NOT stored here.
# Local: put them in `.dev.vars`.  Production: `npx wrangler secret put NAME`.
