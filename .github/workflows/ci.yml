name: CI and Deploy

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Run lint
        run: npm run lint

  deploy:
    name: Deploy production portal
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs:
      - check

    runs-on: ubuntu-latest
    timeout-minutes: 30

    concurrency:
      group: production-portal
      cancel-in-progress: false

    environment:
      name: production
      url: https://portal.wahala-services.com

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production portal
        run: npx opennextjs-cloudflare build
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy production portal
        run: npx opennextjs-cloudflare deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verify production portal
        run: |
          curl \
            --fail \
            --silent \
            --show-error \
            --retry 5 \
            --retry-all-errors \
            --retry-delay 5 \
            https://portal.wahala-services.com/login
