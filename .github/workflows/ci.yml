name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Node 24 ships npm 11 (which accepts the committed lockfile) and satisfies the
          # >=22 engine requirement of wrangler/miniflare. Node 20 (npm 10.8) rejected the
          # lockfile with "npm ci can only install … in sync" and is now deprecated on runners.
          node-version: 24
          cache: npm
      - run: npm ci
      # Type safety
      - run: npx tsc --noEmit
      # Unit + guard tests: stage machine, RBAC policy, access-scope logic,
      # and the DB-access chokepoint (fails if a route/UI imports getDb).
      - run: npm test
