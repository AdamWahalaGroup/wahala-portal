name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Type safety
      - run: npx tsc --noEmit
      # Unit + guard tests: stage machine, RBAC policy, access-scope logic,
      # and the DB-access chokepoint (fails if a route/UI imports getDb).
      - run: npm test
